<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XX公司</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;background:#f5f7fa;color:#333;min-height:100vh}
/* 页头 */
.header{background:linear-gradient(135deg,#e3f2fd 0%,#bbdefb 100%);padding:40px 20px;text-align:center}
.header h1{font-size:28px;color:#1565c0;margin-bottom:6px}
.header .slogan{font-size:15px;color:#1976d2;opacity:.8}
.header .desc{font-size:14px;color:#555;max-width:600px;margin:12px auto 0;line-height:1.6}
/* 产品网格 */
.container{max-width:1200px;margin:0 auto;padding:30px 20px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px}
/* 产品卡片 */
.card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.06);cursor:pointer;transition:transform .2s,box-shadow .2s}
.card:hover{transform:translateY(-4px);box-shadow:0 8px 30px rgba(0,0,0,0.1)}
.card-img{width:100%;height:220px;overflow:hidden;background:#e3f2fd}
.card-img img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.card:hover .card-img img{transform:scale(1.05)}
.no-img{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#bbb;font-size:14px}
.card-body{padding:18px}
.card-body h3{font-size:16px;color:#333;margin-bottom:8px}
.card-params{font-size:12px;color:#1976d2;line-height:1.6;margin-bottom:6px}
.card-desc{font-size:13px;color:#888;line-height:1.5}
.img-count{display:inline-block;margin-top:8px;padding:2px 8px;background:#e3f2fd;color:#1976d2;border-radius:4px;font-size:11px}
/* 页脚 */
.footer{background:#fff;border-top:1px solid #e0e0e0;padding:28px 20px;text-align:center;margin-top:40px}
.footer .info{display:flex;flex-wrap:wrap;justify-content:center;gap:24px;font-size:13px;color:#888}
.footer .info span{display:inline-flex;align-items:center}
.footer .info .label{color:#1976d2;margin-right:4px;font-weight:500}
.footer .copyright{margin-top:14px;font-size:12px;color:#bbb}
/* 灯箱 */
.lightbox{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.92);z-index:9999;display:none;flex-direction:column;align-items:center;justify-content:center}
.lightbox.active{display:flex}
.lb-close{position:absolute;top:16px;right:20px;width:40px;height:40px;background:rgba(255,255,255,0.15);border:none;border-radius:50%;color:#fff;font-size:22px;cursor:pointer;z-index:10;transition:background .2s}
.lb-close:hover{background:rgba(255,255,255,0.3)}
.lb-main{display:flex;align-items:center;gap:20px;max-width:90vw;max-height:80vh}
.lb-main img{max-width:80vw;max-height:75vh;object-fit:contain;border-radius:4px}
.lb-nav{width:44px;height:44px;background:rgba(255,255,255,0.15);border:none;border-radius:50%;color:#fff;font-size:20px;cursor:pointer;flex-shrink:0;transition:background .2s}
.lb-nav:hover{background:rgba(255,255,255,0.3)}
.lb-nav:disabled{opacity:.3;cursor:default}
.lb-info{color:#fff;text-align:center;max-width:80vw;margin-top:20px}
.lb-info h3{font-size:18px;margin-bottom:8px}
.lb-info .lb-params{font-size:13px;color:#90caf9;line-height:1.6;margin-bottom:8px}
.lb-info .lb-desc{font-size:14px;color:#ccc;line-height:1.7}
.lb-counter{font-size:12px;color:#999;margin-top:12px}
/* 响应式 */
@media(max-width:640px){
.header h1{font-size:22px}
.header{padding:28px 16px}
.grid{grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
.container{padding:20px 12px}
.card-img{height:180px}
.lb-main{flex-direction:column;gap:12px}
.lb-main img{max-width:95vw;max-height:55vh}
.lb-nav{position:absolute;bottom:20px}
.lb-nav.prev{left:30px}
.lb-nav.next{right:30px}
}
</style>
</head>

const company = {"name":"XX公司","slogan":"测试标语","desc":"测试简介","address":"测试地址","phone":"111","email":"111"};

let lbProductIdx = 0;
let lbImageIdx = 0;

function openLightbox(productIdx) {
  lbProductIdx = productIdx;
  lbImageIdx = 0;
  document.getElementById('lightbox').classList.add('active');
  document.body.style.overflow = 'hidden';
  updateLightbox();
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
  document.body.style.overflow = '';
}

function lbPrev() {
  const p = products[lbProductIdx];
  if (lbImageIdx > 0) { lbImageIdx--; }
  else { lbImageIdx = (p.images?.length || 1) - 1; }
  updateLightbox();
}

function lbNext() {
  const p = products[lbProductIdx];
  if (lbImageIdx < (p.images?.length || 1) - 1) { lbImageIdx++; }
  else { lbImageIdx = 0; }
  updateLightbox();
}

function updateLightbox() {
  const p = products[lbProductIdx];
  document.getElementById('lbImage').src = p.images?.[lbImageIdx] || '';
  document.getElementById('lbName').textContent = p.name;
  document.getElementById('lbParams').innerHTML = (p.params || '').replace(/\n/g,'<br>');
  document.getElementById('lbDesc').textContent = p.desc || '';
  const total = p.images?.length || 0;
  document.getElementById('lbCounter').textContent = total > 1 ? `${lbImageIdx + 1} / ${total}` : '';
  document.querySelector('.lb-nav.prev').disabled = total <= 1;
  document.querySelector('.lb-nav.next').disabled = total <= 1;
}

// 键盘控制
document.addEventListener('keydown', function(e) {
  const lb = document.getElementById('lightbox');
  if (!lb.classList.contains('active')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') lbPrev();
  if (e.key === 'ArrowRight') lbNext();
});

// 点击遮罩关闭
document.getElementById('lightbox').addEventListener('click', function(e) {
  if (e.target === this) closeLightbox();
});
</script>
